<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Model Viewer — Phandalin dev</title>
<script type="importmap">
  { "imports": { "three": "../vendor/three.module.js", "three/addons/": "../vendor/examples/jsm/" } }
</script>
<style>
  html, body { margin: 0; height: 100%; background: #1d2230; overflow: hidden; }
  canvas { display: block; }
  #info {
    position: fixed; top: 0; left: 0; max-width: 46ch; max-height: 96vh;
    margin: 8px; padding: 8px 10px; overflow: auto;
    font: 11px/1.45 ui-monospace, Menlo, Consolas, monospace;
    color: #d8e0f0; background: rgba(10, 14, 22, 0.78);
    border: 1px solid #3a4358; border-radius: 6px; white-space: pre-wrap;
  }
</style>
</head>
<body>
<pre id="info">Usage: viewer.html?model=assets/.../file.gltf[&amp;scale=N][&amp;anim=ClipName]
Path is relative to the project root.</pre>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const info = document.getElementById('info');
const params = new URLSearchParams(location.search);
const modelPath = params.get('model');
const scale = parseFloat(params.get('scale') || '1') || 1;
const animName = params.get('anim');

const lines = [];
const log = (s) => { lines.push(s); info.textContent = lines.join('\n'); };

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1d2230);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 500);
camera.position.set(3, 2, 4);

const controls = new OrbitControls(camera, renderer.domElement);

scene.add(new THREE.HemisphereLight(0xdfeaff, 0x55503f, 1.1));
const sun = new THREE.DirectionalLight(0xfff2dd, 1.6);
sun.position.set(4, 8, 5);
scene.add(sun);

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(20, 48),
  new THREE.MeshStandardMaterial({ color: 0x39415a, roughness: 1 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);
scene.add(new THREE.GridHelper(40, 40, 0x5a6580, 0x2c3349));

let mixer = null;
const clock = new THREE.Clock();

if (!modelPath) {
  log('No ?model= given.');
  log('Example: viewer.html?model=assets/furniture/table_small.gltf');
} else {
  log('model: ' + modelPath);
  new GLTFLoader().load('../' + modelPath, (gltf) => {
    const root = gltf.scene;
    root.scale.setScalar(scale);

    // Center on the ground plane.
    const box = new THREE.Box3().setFromObject(root);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    root.position.x -= center.x;
    root.position.z -= center.z;
    root.position.y -= box.min.y;
    scene.add(root);

    // Frame the camera on the bounding box.
    const radius = Math.max(size.length() / 2, 0.5);
    const dist = radius / Math.tan((camera.fov * Math.PI / 180) / 2) * 1.3;
    camera.position.set(dist * 0.7, radius + dist * 0.35, dist * 0.8);
    controls.target.set(0, size.y / 2, 0);
    controls.update();

    // Diagnostics.
    const f = (n) => n.toFixed(3);
    log(`bbox size: ${f(size.x)} x ${f(size.y)} x ${f(size.z)} (scale ${scale})`);
    log('root nodes: ' + (root.children.map((c) => c.name || '(unnamed)').join(', ') || '(none)'));
    const meshes = [];
    root.traverse((o) => {
      if (o.isMesh) {
        const mats = (Array.isArray(o.material) ? o.material : [o.material])
          .map((m) => m && m.name || '(unnamed)').join('+');
        meshes.push(`${o.name || '(unnamed)'} [${mats}]`);
      }
    });
    log('meshes (' + meshes.length + '):');
    meshes.forEach((m) => log('  ' + m));
    const clips = gltf.animations || [];
    log('animations (' + clips.length + '): ' +
        (clips.map((c) => c.name).join(', ') || '(none)'));

    if (clips.length) {
      mixer = new THREE.AnimationMixer(root);
      const clip = animName
        ? THREE.AnimationClip.findByName(clips, animName)
        : null;
      if (animName && !clip) log(`anim "${animName}" not found`);
      if (clip) {
        mixer.clipAction(clip).play();
        log('playing: ' + clip.name);
      }
    }
  }, undefined, (err) => log('LOAD ERROR: ' + (err && err.message || err)));
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

renderer.setAnimationLoop(() => {
  if (mixer) mixer.update(clock.getDelta());
  controls.update();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
